        <button *ngIf="jeu" class="btn btn-sm btn-danger me-2" tooltip="Sauvegarder partie" container="body"
          placement="bottom" name="btnSauver" (click)="onSauvegarderJeu()"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512" style="height:1em;width:1.25em;vertical-align:-0.125em;fill:currentColor;" aria-hidden="true"><path d="M64 32C28.7 32 0 60.7 0 96L0 416c0 35.3 28.7 64 64 64l320 0c35.3 0 64-28.7 64-64l0-242.7c0-17-6.7-33.3-18.7-45.3L352 50.7C340 38.7 323.7 32 306.7 32L64 32zm0 96c0-17.7 14.3-32 32-32l192 0c17.7 0 32 14.3 32 32l0 64c0 17.7-14.3 32-32 32L96 224c-17.7 0-32-14.3-32-32l0-64zM224 288a64 64 0 1 1 0 128 64 64 0 1 1 0-128z"/></svg>

  <div class="rr2 max">
    <div class="container-fluid" style="height: 100%;">
      <p *ngIf="chargement">
        Chargement du jeu…
      </p>

      <p *ngIf="compilation">
        Compilation du jeu…
      </p>

      <p *ngIf="!chargement && !compilation && !jeu">
        Veuillez charger un fichier de jeu ou une partie sauvegardée.
        <br>
        <label class="btn btn-secondary btn-file me-2 mt-2" title="Charger un nouveau jeu ou une partie sauvegardée">
          <svg class="me-2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 512" style="height:1em;vertical-align:-0.125em;fill:currentColor;" aria-hidden="true"><path d="M88.7 223.8L0 375.8 0 96C0 60.7 28.7 32 64 32l117.5 0c17 0 33.3 6.7 45.3 18.7l26.5 26.5c12 12 28.3 18.7 45.3 18.7L416 96c35.3 0 64 28.7 64 64l0 32-336 0c-22.8 0-43.8 12.1-55.3 31.8zm27.6 16.1C122.1 230 132.6 224 144 224l400 0c11.5 0 22 6.1 27.7 16.1s5.7 22.2-.1 32.1l-112 192C453.9 474 443.4 480 432 480L32 480c-11.5 0-22-6.1-27.7-16.1s-5.7-22.2 .1-32.1l112-192z"/></svg>Charger<input type="file" accept=".djn,.sav,.txt"
            style="display: none;" name="choixFichierNouveau" (change)="onChargerFichierLocal($event.target)"
            onclick="this.value=null">
        </label>
      </p>

      <div *ngIf="erreurs">
        <div class="text-warning" *ngIf="erreurs.length > 0">
          😣 Aïe ! Il y a quelque chose qui n'a pas fonctionné. Je n'ai peut-être pas tout compris.
        </div>
        <code *ngIf="erreurs.length > 0" class="text-danger">
              <span *ngFor="let err of erreurs">
                  {{err}}<br>
              </span>
            </code>
      </div>

      <!-- Lecteur -->
      <djn-lecteur #lecteur *ngIf="jeu" [jeu]="jeu" [debogueur]="false" (nouvellePartieOuAnnulerTour)="onNouvellePartieOuAnnulerTour($event)"></djn-lecteur>
    </div>
  </div>


</div>
